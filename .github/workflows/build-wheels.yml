name: Build Non-AVX Wheels

on:
  workflow_dispatch: # Запуск вручную

jobs:
  build_wheels:
    name: Build wheels on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        # Указываем нужные версии Python
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install scikit-build cmake ninja

      - name: Build wheel with CMake flags
        shell: bash
        env:
          CMAKE_ARGS: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF"
        run: |
          python -m pip install llama-cpp-python --no-binary llama-cpp-python

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-wheel-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
          if-no-files-found: warn
