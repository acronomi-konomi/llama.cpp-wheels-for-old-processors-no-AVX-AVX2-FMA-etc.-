name: Build Non-AVX Wheels

on:
  workflow_dispatch: # Запуск вручную

jobs:
  build_wheels:
    name: Build wheels on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        # Указываем нужные версии Python
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel cibuildwheel

      - name: Build Wheel
        shell: cmd
        env:
          # Ключевые флаги для отключения современных инструкций
          CMAKE_ARGS: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF"
          FORCE_CMAKE: "1"
          # Ограничиваем сборку только текущей версией из матрицы
          CIBW_BUILD: "cp${{ replace(matrix.python, '.', '') }}-win_amd64"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-wheels-py${{ matrix.python }}
          path: ./wheelhouse/*.whl
