name: Build Non-AVX Wheels

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout llama.cpp-python
        uses: actions/checkout@v4
        with:
          repository: 'abetlen/llama-cpp-python'
          submodules: 'recursive'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel setuptools scikit-build cmake ninja

      - name: Build Wheel
        env:
          CMAKE_ARGS: "-DGGML_AVX=OFF -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_F16C=OFF"
          SKBUILD_CMAKE_BUILD_TYPE: "Release"
        shell: bash
        run: |
          python setup.py bdist_wheel
          mkdir -p wheelhouse
          cp dist/*.whl wheelhouse/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-python-wheel-py${{ matrix.python-version }}
          path: wheelhouse/
          if-no-files-found: warn

      - name: Debug - List files
        if: always()
        run: |
          echo "=== Wheelhouse contents ==="
          ls -la wheelhouse/ 2>/dev/null || echo "No wheelhouse directory"
          echo "=== Dist contents ==="
          ls -la dist/ 2>/dev/null || echo "No dist directory"
